<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>💗 1 year · open the box</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fba0bb 0%, #ffc2d0 100%);
            font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        /* modern glassmorphism card */
        .anniversary-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 235, 240, 0.25);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(190, 60, 90, 0.25), inset 0 2px 6px rgba(255,255,255,0.8);
            padding: 28px 18px 32px;
            color: white;
            transition: all 0.2s;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-weight: 600;
            font-size: 2.4rem;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 10px rgba(180, 60, 80, 0.4);
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .subhead {
            font-size: 1.2rem;
            opacity: 0.95;
            font-weight: 400;
            background: rgba(255,255,255,0.15);
            padding: 8px 18px;
            border-radius: 80px;
            display: inline-block;
            margin-bottom: 18px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* 15 pictures – modern minimal grid */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 24px 0 18px;
        }

        .photo-item {
            aspect-ratio: 1 / 1;
            border-radius: 22px 6px 22px 6px;
            border: 2.5px solid white;
            overflow: hidden;
            background: #ffb8c9;
            box-shadow: 0 8px 0 rgba(150, 60, 80, 0.4), 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.15s;
            cursor: pointer;
        }

        .photo-item:active {
            transform: scale(0.97);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #ffb0c0;
        }

        .photo-item span {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 2rem;
            color: white;
            background: #ffb0c0;
        }

        /* modern box – floating neomorphism */
        .gift-section {
            margin: 24px 0 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .magic-box {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border: 3px solid white;
            border-radius: 48px;
            padding: 16px 30px;
            box-shadow: 0 20px 30px -6px rgba(170, 70, 90, 0.5), 0 8px 0 #b88797, 0 0 0 2px rgba(255,255,255,0.5) inset;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            width: fit-content;
            min-width: 220px;
        }

        .magic-box:active {
            transform: translateY(8px);
            box-shadow: 0 10px 20px -6px rgba(170, 70, 90, 0.5), 0 2px 0 #b0727e, 0 0 0 2px rgba(255,255,255,0.5) inset;
        }

        .box-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .box-icon {
            font-size: 4.8rem;
            filter: drop-shadow(0 10px 6px #c06b81);
            transition: 0.2s;
        }

        .box-label {
            background: white;
            color: #f28ba8;
            font-weight: 700;
            font-size: 1.5rem;
            padding: 10px 30px;
            border-radius: 50px;
            border: 2px solid white;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 0 #c48b9b;
        }

        .hint-modern {
            font-size: 1rem;
            margin-top: 10px;
            background: rgba(255,255,255,0.2);
            padding: 6px 18px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .reset-modern {
            color: white;
            font-size: 1rem;
            margin-top: 24px;
            text-decoration: underline;
            text-underline-offset: 4px;
            cursor: pointer;
            opacity: 0.85;
            transition: 0.2s;
            background: rgba(255,255,255,0.15);
            padding: 8px 22px;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .reset-modern:active { opacity: 1; background: rgba(255,255,255,0.3); }

        /* redirect note - HIDDEN (kept in DOM but invisible) */
        .redirect-note {
            display: none;
        }

        /* ---------- FULLSCREEN IMAGE VIEWER (LIGHTBOX) ---------- */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
        }

        .lightbox-content {
            position: relative;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lightbox-image {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 30px;
            border: 4px solid white;
            background: #ffb8c9;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .lightbox-counter {
            color: white;
            font-size: 1.2rem;
            margin: 18px 0 12px;
            background: rgba(255,255,255,0.2);
            padding: 8px 22px;
            border-radius: 60px;
            border: 1px solid white;
        }

        .lightbox-nav {
            display: flex;
            gap: 30px;
            align-items: center;
            justify-content: center;
            margin: 12px 0;
        }

        .lightbox-nav-btn {
            background: rgba(255,255,255,0.25);
            border: 2px solid white;
            color: white;
            font-size: 2.5rem;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
            backdrop-filter: blur(6px);
            user-select: none;
        }

        .lightbox-nav-btn:active {
            background: rgba(255,255,255,0.5);
            transform: scale(0.92);
        }

        .lightbox-close {
            position: absolute;
            top: 0px;
            right: 0px;
            background: rgba(255,255,255,0.25);
            border: 2px solid white;
            color: white;
            font-size: 2.2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
            backdrop-filter: blur(6px);
            z-index: 10;
        }

        .lightbox-close:active {
            background: rgba(255,255,255,0.5);
            transform: scale(0.92);
        }
    </style>
</head>
<body>
    <div class="anniversary-card">
        <h1>✨ one year ✨</h1>
        <div class="subhead">forever us</div>
 
        <!-- 15 PHOTO GRID (click any image to open viewer) -->
        <div class="photo-grid" id="photoGrid"></div>

        <!-- GIFT BOX SECTION -->
        <div class="gift-section">
            <div class="magic-box" id="magicBox">
                <div class="box-content" id="boxCover">
                    <span class="box-icon">🎁</span>
                    <span class="box-label">open me</span>
                </div>
            </div>
            <div class="hint-modern">(tap to open your card)</div>
        </div> 
        
        <!-- Redirect note - hidden with CSS (kept for functionality but invisible) -->
        <div class="redirect-note" id="redirectNote">
            after opening, you'll be linked to your personal card
        </div>

        <!-- reset button (goes back to main box) -->
        <div class="reset-modern" id="resetBtn">↺ back to box</div>
    </div>

    <!-- FULLSCREEN LIGHTBOX (hidden by default) -->
    <div class="lightbox-overlay" id="lightboxOverlay">
        <div class="lightbox-content">
            <div class="lightbox-close" id="lightboxClose">✕</div>
            <img class="lightbox-image" id="lightboxImg" src="" alt="our memory">
            <div class="lightbox-counter" id="lightboxCounter">1/15</div>
            <div class="lightbox-nav">
                <div class="lightbox-nav-btn" id="lightboxPrev">←</div>
                <div class="lightbox-nav-btn" id="lightboxNext">→</div>
            </div>
        </div>
    </div>

                "https://scontent.facc6-1.fna.fbcdn.net/v/t39.30808-6/645697588_812196888586502_706496825967918672_n.jpg?_nc_cat=103&ccb=1-7&_nc_sid=7b2446&_nc_eui2=AeHSTu0F8rDHu5K26G4cLRI7mht_Zla2eOGaG39mVrZ44SEEG_TgQ9I-ZOiY_b407182FoQHgba0JGmZDDB6RKZT&_nc_ohc=0e4bkiR-2OAQ7kNvwGyh3qm&_nc_oc=Adm7n6P9M_hd3-kbd5_VOV9F_7b53v2-2_ARmtiHU6VqfcUci4lw8l_Bv36Q1Du-3ao&_nc_zt=23&_nc_ht=scontent.facc6-1.fna&_nc_gid=VxIJQIhQGfR8UDoT7DeVFQ&_nc_ss=8&oh=00_AfwQ9LVxFUL4qjWFCdITriNqsu9QLwSfh4-0Gi3DBjZQ_Q&oe=69AE7C87"
            ];

            // Store image elements and their sources for lightbox
            const imageSources = [...facebookImageLinks]; // copy array
            const photoItems = [];

            // render 15 images and attach click for lightbox
            const grid = document.getElementById('photoGrid');
            for (let i = 0; i < 15; i++) {
                const cell = document.createElement('div');
                cell.className = 'photo-item';
                const img = document.createElement('img');
                img.src = facebookImageLinks[i] || "https://via.placeholder.com/200/ffb6c1/ffffff?text=💗";
                img.alt = 'our memory';
                img.onerror = function() {
                    this.style.display = 'none';
                    const span = document.createElement('span');
                    span.textContent = '💕';
                    cell.appendChild(span);
                };
                cell.appendChild(img);
                grid.appendChild(cell);
                
                // store reference
                photoItems.push(cell);
                
                // add click event to open lightbox at this image
                cell.addEventListener('click', (function(index) {
                    return function(e) {
                        e.stopPropagation();
                        openLightbox(index);
                    };
                })(i));
            }

            // --------------------------------------------------------------
            // LIGHTBOX FUNCTIONALITY
            // --------------------------------------------------------------
            const overlay = document.getElementById('lightboxOverlay');
            const lightboxImg = document.getElementById('lightboxImg');
            const counter = document.getElementById('lightboxCounter');
            const prevBtn = document.getElementById('lightboxPrev');
            const nextBtn = document.getElementById('lightboxNext');
            const closeBtn = document.getElementById('lightboxClose');

            let currentIndex = 0;

            function openLightbox(index) {
                currentIndex = index;
                updateLightbox();
                overlay.style.display = 'flex';
            }

            function closeLightbox() {
                overlay.style.display = 'none';
            }

            function updateLightbox() {
                if (imageSources[currentIndex]) {
                    lightboxImg.src = imageSources[currentIndex];
                } else {
                    lightboxImg.src = "https://via.placeholder.com/500/ffb6c1/ffffff?text=💕";
                }
                counter.textContent = `${currentIndex+1} / ${imageSources.length}`;
            }

            function nextImage() {
                currentIndex = (currentIndex + 1) % imageSources.length;
                updateLightbox();
            }

            function prevImage() {
                currentIndex = (currentIndex - 1 + imageSources.length) % imageSources.length;
                updateLightbox();
            }

            // event listeners
            prevBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                prevImage();
            });

            nextBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                nextImage();
            });

            closeBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                closeLightbox();
            });

            overlay.addEventListener('click', function(e) {
                // close if clicking outside the content
                if (e.target === overlay) {
                    closeLightbox();
                }
            });

            // swipe/touch navigation optional: left/right arrows key
            document.addEventListener('keydown', function(e) {
                if (overlay.style.display === 'flex') {
                    if (e.key === 'ArrowRight') {
                        nextImage();
                    } else if (e.key === 'ArrowLeft') {
                        prevImage();
                    } else if (e.key === 'Escape') {
                        closeLightbox();
                    }
                }
            });

            // --------------------------------------------------------------
            // BOX TAP -> REDIRECT TO CARD.HTML
            // --------------------------------------------------------------
            const magicBox = document.getElementById('magicBox');
            const resetBtn = document.getElementById('resetBtn');
            const redirectNote = document.getElementById('redirectNote');

            magicBox.addEventListener('click', function(e) {
                e.stopPropagation();
                window.location.href = 'card.html';
            });

            resetBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                window.location.href = window.location.pathname; // reloads this page
            });

            // Redirect note is hidden with CSS, but we keep its text update for functionality
            if (redirectNote) {
                redirectNote.innerHTML = '⭐ tap the box → opens <strong>card.html</strong> (your love message)';
            }
        })();
    </script>
</body>
